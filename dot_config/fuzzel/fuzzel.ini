[main]
font=JetBrainsMono Nerd Font:size=14
terminal=kitty -e
layer=overlay
launch-prefix='uwsm app -- '
prompt='>> '
width=60
lines=20
line-height=24
vertical-pad=8
horizontal-pad=14
inner-pad=8

[colors]
background=161217ff
text=e9e0e8ff
selection=4b454dff
selection-text=cdc3ceff
border=bd93f9ff
match=dfb8f6ff
selection-match=dfb8f6ff

[dmenu]
exit-immediately-if-empty=yes

[border]
width=2
radius=18
