[main]
font=JetBrainsMono Nerd Font:size=14
terminal=footclient -e
layer=overlay
launch-prefix='app2unit --fuzzel-compat --'
prompt='>> '
width=60
lines=20
line-height=24
vertical-pad=8
horizontal-pad=14
inner-pad=8

[colors]
background=1e1e2edd
text=cdd6f4ff
prompt=bac2deff
placeholder=7f849cff
input=cdd6f4ff
match=cba6f7ff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=cba6f7ff
counter=7f849cff
border=cba6f7ff

[dmenu]
exit-immediately-if-empty=yes

[border]
width=2
radius=18
