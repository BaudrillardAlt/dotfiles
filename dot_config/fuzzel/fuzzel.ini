[main]
font=JetBrainsMono Nerd Font:size=14
terminal=kitty -e
layer=overlay
launch-prefix='app2unit --fuzzel-compat --'
prompt='>> '
width=60
lines=20
line-height=24
vertical-pad=8
horizontal-pad=14
inner-pad=8

[colors]
background=001419ff
text=839395ff
match=46acf5ff
selection=004080ff
selection-match=46acf5ff
selection-text=ffffffff
border=063540ff

[dmenu]
exit-immediately-if-empty=yes

[border]
width=2
radius=18
